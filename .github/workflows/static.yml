name: CI / Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Playwright browsers + system deps
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        run: uv run pytest -v

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  deploy:
    name: Deploy GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      ELECTIONS_BASE_PATH: /cyprus-parliamentary-elections-2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject Azure API keys
        run: |
          sed -i "s|__QUEENS_AZURE_API_KEY__|${{ vars.QUEENS_AZURE_API_KEY }}|g" assets/main.js
          sed -i "s|__VOL_AZURE_API_KEY__|${{ vars.VOL_AZURE_API_KEY }}|g" assets/main.js

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cyprus-parliamentary-elections-2026/package-lock.json

      - name: Install elections deps
        working-directory: cyprus-parliamentary-elections-2026
        run: npm ci

      - name: Build elections
        working-directory: cyprus-parliamentary-elections-2026
        env:
          BASE_PATH: ${{ env.ELECTIONS_BASE_PATH }}
        run: npm run build

      - name: Stage elections build at published path
        run: |
          # Replace the source checkout with just the build output so the
          # uploaded artifact only contains static assets, not source.
          mv cyprus-parliamentary-elections-2026/build /tmp/elections-build
          rm -rf cyprus-parliamentary-elections-2026
          mv /tmp/elections-build cyprus-parliamentary-elections-2026
          # SvelteKit emits _app/ which Jekyll would strip — disable Jekyll.
          touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
